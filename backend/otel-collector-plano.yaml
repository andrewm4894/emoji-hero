# Dedicated OTEL collector that bridges Plano's signal spans to PostHog.
#
# Plano emits OTLP/gRPC (no auth headers, gRPC only). PostHog ingests OTLP/HTTP
# with a Bearer token. This collector receives Plano's gRPC on :4319 and
# forwards to whatever PostHog is configured via env (POSTHOG_OTEL_ENDPOINT +
# POSTHOG_API_KEY), plus a debug log so we can watch spans locally.
#
# This is intentionally SEPARATE from the posthog-repo otel-collector-local
# (which is for other local work) so Plano traffic stays isolated.
#
# Run (reads both env vars from backend/.env):
#   docker run -d --name plano-otel-bridge -p 4319:4319 \
#     --env-file backend/.env \
#     -v "$PWD/backend/otel-collector-plano.yaml:/etc/otelcol-contrib/config.yaml" \
#     otel/opentelemetry-collector-contrib:0.142.0 --config=/etc/otelcol-contrib/config.yaml
receivers:
  otlp:
    protocols:
      grpc:
        endpoint: 0.0.0.0:4319

processors:
  batch:

exporters:
  debug:
    verbosity: detailed
  otlphttp/posthog:
    # Exact PostHog OTLP/HTTP traces URL (no /v1/traces auto-suffix).
    traces_endpoint: ${env:POSTHOG_OTEL_ENDPOINT}
    headers:
      Authorization: Bearer ${env:POSTHOG_API_KEY}

service:
  pipelines:
    traces:
      receivers: [otlp]
      processors: [batch]
      exporters: [debug, otlphttp/posthog]
