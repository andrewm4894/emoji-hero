<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="128" y2="128" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#fbbf24"/>
      <stop offset="50%" stop-color="#f59e0b"/>
      <stop offset="100%" stop-color="#d97706"/>
    </linearGradient>
    <linearGradient id="star" x1="0" y1="20" x2="128" y2="108" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#fef3c7"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <!-- Background with rounded corners -->
  <rect width="128" height="128" rx="26" fill="url(#bg)"/>
  <!-- Inner shadow / depth -->
  <rect x="4" y="4" width="120" height="120" rx="22" fill="none" stroke="white" stroke-opacity="0.2" stroke-width="2"/>
  <!-- Starburst - 5 point star, thick and heroic -->
  <polygon
    points="64,18 74.5,47.5 106,47.5 80.5,66 90,96 64,78 38,96 47.5,66 22,47.5 53.5,47.5"
    fill="url(#star)"
    filter="url(#glow)"
  />
  <!-- Inner star cutout for depth -->
  <polygon
    points="64,34 70,50 87,50 73.5,61 78.5,78 64,68.5 49.5,78 54.5,61 41,50 58,50"
    fill="url(#bg)"
    opacity="0.3"
  />
  <!-- Corner sparkles -->
  <circle cx="20" cy="20" r="4" fill="white" opacity="0.7"/>
  <circle cx="20" cy="20" r="2" fill="white"/>
  <circle cx="108" cy="108" r="3" fill="white" opacity="0.5"/>
  <circle cx="108" cy="20" r="2.5" fill="white" opacity="0.4"/>
</svg>
